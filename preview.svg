<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#111122"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
    <line x1="40" y1="0" x2="40" y2="630"/><line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="280" y1="0" x2="280" y2="630"/><line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="440" y1="0" x2="440" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="520" y1="0" x2="520" y2="630"/><line x1="560" y1="0" x2="560" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="680" y1="0" x2="680" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="760" y1="0" x2="760" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="880" y1="0" x2="880" y2="630"/>
    <line x1="920" y1="0" x2="920" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/><line x1="1040" y1="0" x2="1040" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1120" y1="0" x2="1120" y2="630"/>
    <line x1="1160" y1="0" x2="1160" y2="630"/>
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="440" x2="1200" y2="440"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="520" x2="1200" y2="520"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Title - centered -->
  <text x="600" y="280" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="80" font-weight="800" letter-spacing="10" fill="#22d3ee" filter="url(#glow-text)">SNAKE</text>

  <!-- Subtitle -->
  <text x="600" y="340" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="600" letter-spacing="6" fill="rgba(148, 163, 184, 0.5)">PLAY NOW</text>

  <!-- Snake body - horizontal across bottom area, moving right -->
  <g filter="url(#glow-cyan)">
    <rect x="200" y="430" width="36" height="36" rx="6" fill="rgba(34, 211, 238, 0.35)"/>
    <rect x="240" y="430" width="36" height="36" rx="6" fill="rgba(34, 211, 238, 0.45)"/>
    <rect x="280" y="430" width="36" height="36" rx="6" fill="rgba(34, 211, 238, 0.55)"/>
    <rect x="320" y="430" width="36" height="36" rx="6" fill="rgba(34, 211, 238, 0.65)"/>
    <rect x="360" y="430" width="36" height="36" rx="6" fill="rgba(34, 211, 238, 0.75)"/>
    <rect x="400" y="430" width="36" height="36" rx="6" fill="rgba(34, 211, 238, 0.85)"/>
    <rect x="440" y="430" width="36" height="36" rx="6" fill="rgba(34, 211, 238, 0.9)"/>
    <rect x="480" y="430" width="36" height="36" rx="6" fill="rgba(34, 211, 238, 0.95)"/>
    <!-- Head -->
    <rect x="520" y="430" width="36" height="36" rx="6" fill="#22d3ee"/>
  </g>

  <!-- Snake eyes (looking right) -->
  <circle cx="546" cy="442" r="4" fill="white"/>
  <circle cx="546" cy="458" r="4" fill="white"/>
  <circle cx="549" cy="442" r="2" fill="#111122"/>
  <circle cx="549" cy="458" r="2" fill="#111122"/>

  <!-- Food - ahead of snake -->
  <g filter="url(#glow-red)">
    <circle cx="700" cy="448" r="16" fill="#ef4444" opacity="0.9"/>
  </g>

  <!-- Food - scattered -->
  <g filter="url(#glow-red)">
    <circle cx="900" cy="200" r="14" fill="#ef4444" opacity="0.85"/>
  </g>
  <g filter="url(#glow-red)">
    <circle cx="350" cy="180" r="14" fill="#ef4444" opacity="0.8"/>
  </g>

  <!-- Obstacle cluster - top right -->
  <g opacity="0.75">
    <rect x="880" y="400" width="36" height="36" rx="5" fill="rgba(59, 130, 246, 0.8)"/>
    <rect x="920" y="400" width="36" height="36" rx="5" fill="rgba(59, 130, 246, 0.75)"/>
    <rect x="960" y="400" width="36" height="36" rx="5" fill="rgba(59, 130, 246, 0.8)"/>
    <rect x="920" y="440" width="36" height="36" rx="5" fill="rgba(59, 130, 246, 0.7)"/>
  </g>
</svg>
